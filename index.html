<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatchDeal.in - Top Amazon Deals</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      color: #ff5722;
      font-size: 2.5rem;
    }

    h2 {
      margin-top: 3rem;
      color: #333;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .product-card {
      background: white;
      padding: 1.5rem;
      width: 260px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .product-card h3 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .product-card a {
      display: inline-block;
      background: #ff9900;
      color: #000;
      padding: 0.6rem 1.2rem;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    .footer {
      margin-top: 3rem;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <h1>CatchDeal.in</h1>
  <p>Top curated Amazon deals</p>

  <section id="top-amazon-products">
    <h2>Top Selling Products on Amazon</h2>
    <div id="products-container">
      <!-- products.html loads here -->
    </div>
  </section>

  <script>
    fetch('data/products.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('products-container').innerHTML = html;
      })
      .catch(error => {
        document.getElementById('products-container').innerHTML =
          'Unable to load products.';
        console.error(error);
      });
  </script>

  <div class="footer">
    © 2025 CatchDeal.in | All rights reserved.
  </div>

</body>
</html>
