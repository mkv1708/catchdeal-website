<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatchDeal.in - Deals</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      color: #ff5722;
      font-size: 2.5rem;
    }

    h2 {
      margin-top: 3rem;
      color: #333;
    }

    .categories {
      margin-top: 2rem;
    }

    .categories a {
      display: inline-block;
      background: #28a745;
      color: white;
      padding: 1rem 2rem;
      margin: 0.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1.1rem;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .product-card {
      background: white;
      padding: 1.5rem;
      width: 260px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .product-card h3 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .product-card a {
      display: inline-block;
      background: #ff9900;
      color: #000;
      padding: 0.6rem 1.2rem;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    .footer {
      margin-top: 3rem;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <h1>CatchDeal.in</h1>
  <p>Select a category to explore deals</p>

  <!-- Categories (can ignore for now) -->
  <div class="categories">
    household.htmlHousehold</a>
    others.htmlOthers</a>
    fashion.htmlFashion & Lifestyle</a>
  </div>

  <!-- PRODUCT SECTION -->
  <section id="top-amazon-products">
    <h2>Top Selling Products on Amazon</h2>

    <div id="products-container">
      <!-- products.html will be loaded here -->
    </div>
  </section>

  <!-- LOAD products.html -->
  <script>
    fetch('data/products.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('products-container').innerHTML = html;
      })
      .catch(error => {
        console.error('Error loading products:', error);
      });
  </script>

  <div class="footer">
    © 2025 CatchDeal.in | All rights reserved.
  </div>

</body>
</html>
